server {
    listen 80;
    listen [::]:80;
    server_name maheutnicolascv.fr www.maheutnicolascv.fr;

    root /var/www/portfolio/dist;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA — toutes les routes renvoient vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy vers le backend Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # Sécurité — headers recommandés
    add_header X-Frame-Options      "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy      "strict-origin-when-cross-origin" always;

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/portfolio.access.log;
    error_log  /var/log/nginx/portfolio.error.log warn;
}